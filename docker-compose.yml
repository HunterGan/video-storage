services:
  # API Service (migrations run once at startup via ENTRYPOINT)
  api:
    build:
      context: ./video-upload-service-v2
      dockerfile: Dockerfile
    container_name: video_api
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-video_user}:${POSTGRES_PASSWORD:-video_pass}@postgres:5432/${POSTGRES_DB:-video_upload_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - CDN_BASE_URL=${CDN_BASE_URL}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    restart: unless-stopped

  # Frontend Service (uses service_healthy — api must be ready)
  frontend:
    build:
      context: ./ui-video-upload-service
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_KEY: ${VITE_API_KEY}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT}
    container_name: video_frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Video Worker Service
  video-worker:
    build:
      context: ./video-upload-service-v2
      dockerfile: Dockerfile.worker
    container_name: video_worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-video_user}:${POSTGRES_PASSWORD:-video_pass}@postgres:5432/${POSTGRES_DB:-video_upload_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - CDN_BASE_URL=${CDN_BASE_URL}
      - WORKER_CONCURRENCY=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: video_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - app-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: video_postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-video_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-video_pass}
      - POSTGRES_DB=${POSTGRES_DB:-video_upload_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_user} -d ${POSTGRES_DB:-video_upload_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
