services:
  # Rust Backend Service
  video-upload-service:
    build:
      context: ./video-upload-service-v2
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-video_user}:${POSTGRES_PASSWORD:-video_pass}@postgres:5432/${POSTGRES_DB:-video_upload_db}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - CDN_BASE_URL=${CDN_BASE_URL}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-500}
      - ALLOWED_VIDEO_TYPES=${ALLOWED_VIDEO_TYPES}
      - PRESIGNED_URL_TTL_SECONDS=${PRESIGNED_URL_TTL_SECONDS:-3600}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - RATE_LIMIT_REQUESTS_PER_SECOND=${RATE_LIMIT_REQUESTS_PER_SECOND:-100}
      - ENABLE_REQUEST_ID=${ENABLE_REQUEST_ID:-true}
      - RUST_LOG=${RUST_LOG:-video_upload_service=info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      # Optional: for temporary file storage
      - uploads:/tmp/uploads

  # React Frontend Service
  ui-video-upload-service:
    build:
      context: ./ui-video-upload-service
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_KEY: ${VITE_API_KEY}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT}
    ports:
      - "3000:80"
    depends_on:
      - video-upload-service
    networks:
      - app-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: video_upload_db
    ports:
      - "5434:5432"  # Exposed for local development access
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-video_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-video_pass}
      - POSTGRES_DB=${POSTGRES_DB:-video_upload_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_user} -d ${POSTGRES_DB:-video_upload_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  uploads:
