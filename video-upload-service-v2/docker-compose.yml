# docker-compose.yml
# ===================

x-common-settings: &common-settings
  restart: unless-stopped
  environment:
    - NODE_ENV=production
    - APP_HOST=0.0.0.0
    - APP_PORT=8080
    - LOG_LEVEL=info
  healthcheck:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  networks:
    - video-network

services:
  # Postgres
  postgres:
    image: postgres:16-alpine
    <<: *common-settings
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-video_upload}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-video_upload}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3 compatible)
  minio:
    image: minio/minio:latest
    <<: *common-settings
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create MinIO buckets on startup
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${S3_BUCKET:-videos};
        mc anonymous set public local/${S3_BUCKET:-videos};
      "
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-videos}

  # Video Upload Service (Rust version - commented out)
  # video-upload-service:
  #   build:
  #     context: ../video-upload-service
  #     dockerfile: Dockerfile
  #   <<: *common-settings
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-video_upload}
  #     - S3_ENDPOINT=http://minio:9000
  #     - S3_BUCKET=${S3_BUCKET:-videos}
  #     - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
  #     - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}

  # Video Upload Service v2 (NestJS)
  video-upload-service-v2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=${NODE_VERSION:-22}
    <<: *common-settings
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-video_upload}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-videos}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_REGION=${S3_REGION:-ru-moscow-1}
      - PRESIGNED_URL_TTL_SECONDS=${PRESIGNED_URL_TTL_SECONDS:-3600}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-500}
      - ALLOWED_VIDEO_TYPES=${ALLOWED_VIDEO_TYPES:-video/mp4,video/webm,video/quicktime}
      - CDN_BASE_URL=${CDN_BASE_URL:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - VIDEO_PROCESSING_ENABLED=${VIDEO_PROCESSING_ENABLED:-false}
      - VIDEO_JOB_BUFFER_SIZE=${VIDEO_JOB_BUFFER_SIZE:-100}
      - VIDEO_JOB_INTERVAL_MS=${VIDEO_JOB_INTERVAL_MS:-1000}
      - VIDEO_JOB_MAX_RETRIES=${VIDEO_JOB_MAX_RETRIES:-3}
      - ENABLE_REQUEST_ID=${ENABLE_REQUEST_ID:-true}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

volumes:
  postgres-data:
  minio-data:

networks:
  video-network:
    driver: bridge
